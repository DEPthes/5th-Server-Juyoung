<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <style>
        .error-msg { color: red; font-size: 14px; }
    </style>
</head>
<body>
<h1>로그인</h1>

<form th:action="@{/login}" th:object="${loginForm}" method="post">
    <div th:if="${#fields.hasGlobalErrors()}">
        <p class="error-msg" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
    </div>

    <div>
        <label th:for="email">이메일:</label>
        <input type="text" th:field="*{email}" placeholder="example@email.com">
        <p class="error-msg" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
    </div>

    <div>
        <label th:for="password">비밀번호:</label>
        <input type="password" th:field="*{password}" placeholder="비밀번호를 입력하세요">
        <p class="error-msg" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
    </div>

    <br>
    <button type="submit">로그인하기</button>
</form>
<br><hr>
<div>
    <button type="button" th:onclick="|location.href='@{/members/new}'|">회원가입</button>
</div>
</body>
</html>
