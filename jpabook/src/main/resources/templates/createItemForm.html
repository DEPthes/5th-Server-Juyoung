<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 등록</title>
</head>
<body>
<h1>상품 등록</h1>

<form th:action="@{/items/new}" th:object="${form}" method="post">
    <div>
        <label th:for="name">상품명</label>
        <input type="text" th:field="*{name}" placeholder="이름을 입력하세요">
    </div>
    <div>
        <label th:for="price">가격</label>
        <input type="number" th:field="*{price}" placeholder="가격">
    </div>
    <div>
        <label th:for="stockQuantity">수량</label>
        <input type="number" th:field="*{stockQuantity}" placeholder="수량">
    </div>
    <div>
        <label th:for="author">저자</label>
        <input type="text" th:field="*{author}" placeholder="저자">
    </div>
    <div>
        <label th:for="isbn">ISBN</label>
        <input type="text" th:field="*{isbn}" placeholder="ISBN">
    </div>
    <button type="submit">등록하기</button>
</form>
</body>
</html>
